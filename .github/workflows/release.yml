name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]*"

jobs:
  build:
    name: Build release artifacts
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # WiX v4 is a .NET global tool; add its install dir to PATH for subsequent steps.
      - name: Install WiX v4
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 4.0.5 --allow-downgrade
          "$env:USERPROFILE\.dotnet\tools" |
            Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Build binaries + MSI
        shell: pwsh
        run: |
          .\scripts\build-installer.ps1 -Version ${{ steps.version.outputs.version }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ steps.version.outputs.version }}
          path: |
            dist/cerclbackup.exe
            dist/cerclbackup-tray.exe
            dist/cerclbackup-setup-*.msi

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-${{ needs.build.outputs.version }}
          path: dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/cerclbackup.exe
            dist/cerclbackup-tray.exe
            dist/cerclbackup-setup-*.msi
          generate_release_notes: true
